name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            spec: yaytd_lin.spec
            asset_name: linux.zip
          - os: macos-14
            spec: yaytd_mac.spec
            asset_name: mac.zip
          - os: windows-2022
            spec: yaytd_win.spec
            asset_name: win.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk-dev tcl-dev

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build application
        run: python -m PyInstaller --noconfirm --clean ${{ matrix.spec }}

      - name: Package Linux build
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          zip -j release/${{ matrix.asset_name }} dist/yaytd

      - name: Package macOS build
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent dist/yaytd.app release/${{ matrix.asset_name }}

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist/yaytd.exe -DestinationPath release/${{ matrix.asset_name }} -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Updates:
          - migrated the UI to tkinter.ttk with sv-ttk automatic light/dark theme support
          - switched YouTube extraction/downloads to yt-dlp
          - added per-stream download cancellation
          - updated Python dependencies and PyInstaller packaging

          Download the zip for your OS, unzip and run.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/*.zip --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" release-assets/*.zip \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md
          fi
